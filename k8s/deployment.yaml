apiVersion: apps/v1
kind: Deployment
metadata:
  name: fed-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fed-backend
  template:
    metadata:
      labels:
        app: fed-backend
    spec:
      automountServiceAccountToken: false   

      containers:
      - name: fed-backend
        image: sanjuhu/fed-checkup-backend:v1  

        ports:
        - containerPort: 5000

        resources:  
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
